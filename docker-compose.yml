version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_INSFORGE_URL: ${NEXT_PUBLIC_INSFORGE_URL}
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - INSFORGE_API_KEY=${INSFORGE_API_KEY}
    restart: always
